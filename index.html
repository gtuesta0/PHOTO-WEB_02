<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gino Tuesta | Fotografía de Conservación</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #0A192F;
            --accent-jbl: #FF6600; 
            --subtle-text: #5A677A;
            --light-bg: #F9FAFB;
            --font-main: 'Montserrat', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); color: var(--text-color); background: var(--bg-color); line-height: 1.6; }
        
        header { padding: 30px 8%; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #EEE; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.8rem; font-family: var(--font-serif); text-transform: uppercase; letter-spacing: 2px; line-height: 0.9; cursor: pointer; }
        .logo span { display: block; font-family: var(--font-main); font-size: 0.65rem; letter-spacing: 6px; font-weight: 300; color: var(--subtle-text); margin-top: 5px; }
        
        .nav-right { display: flex; align-items: center; gap: 25px; }
        .search-box { border: 1px solid #EEE; padding: 8px 15px; font-family: var(--font-main); font-size: 0.75rem; outline: none; width: 150px; transition: 0.4s; }
        .search-box:focus { width: 220px; border-color: var(--text-color); }
        .social-nav a { color: var(--text-color); font-size: 1.1rem; transition: 0.3s; opacity: 0.7; margin-left: 10px; text-decoration: none; display: inline-block; }
        .social-nav a:hover { opacity: 1; transform: translateY(-2px); }

        .hero { height: 85vh; background: linear-gradient(rgba(10,25,47,0.4), rgba(10,25,47,0.6)), url('mi-portada.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .hero p { font-size: 0.9rem; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 10px; }
        .hero h1 { font-size: 4.5rem; font-family: var(--font-serif); font-weight: 400; }

        .about-section { padding: 100px 8%; background: var(--light-bg); display: flex; align-items: flex-start; gap: 60px; }
        .about-img { flex: 1; }
        .about-img img { width: 100%; max-width: 450px; border: 1px solid #ddd; padding: 12px; background: white; }
        .about-text { flex: 1.2; text-align: justify; }
        .about-text h2 { font-size: 2.8rem; font-family: var(--font-serif); margin-bottom: 20px; text-align: left; }
        .about-text p { margin-bottom: 15px; font-size: 1rem; color: var(--text-color); }

        .section-container { padding: 80px 8%; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .folder-card { position: relative; height: 500px; overflow: hidden; cursor: pointer; background: black; }
        .folder-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.8s; }
        .folder-card:hover img { transform: scale(1.05); opacity: 0.6; }
        .folder-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; color: white; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }

        /* ELIMINADA LA MARCA DE AGUA DE AQUÍ */

        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { max-width: 90%; max-height: 90%; margin: 2% auto; position: relative; display: flex; align-items: center; justify-content: center; }
        .modal-close { position: absolute; top: -40px; right: 0; color: white; font-size: 2.5rem; cursor: pointer; z-index: 2100; }
        .modal-img { max-width: 100%; max-height: 90vh; object-fit: contain; }

        /* MARCA DE AGUA SUTIL Y PEQUEÑA (SÓLO EN EL MODAL) */
        .modal-watermark { position: absolute; bottom: 10px; right: 15px; color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; pointer-events: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-weight: 300; }

        .contact-section { padding: 100px 8%; background: white; border-top: 1px solid #EEE; }
        .contact-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; gap: 60px; }
        .contact-info { flex: 1; }
        .contact-info h2 { font-family: var(--font-serif); font-size: 3rem; font-weight: 400; margin-bottom: 20px; }
        .contact-form { flex: 1.2; }
        .contact-form input, .contact-form textarea { width: 100%; border: none; border-bottom: 1px solid #CCC; padding: 12px 0; font-family: var(--font-main); outline: none; background: transparent; margin-bottom: 25px; display: block; }
